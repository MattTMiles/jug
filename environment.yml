name: jug
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python>=3.12

  # Core scientific stack
  - numpy>=2.4
  - scipy>=1.17
  - astropy>=7.2

  # JAX (CPU version - for GPU, see docs)
  - pip

  # GUI dependencies (conda-forge for proper Qt integration)
  - pyside6>=6.10
  - pyqtgraph>=0.14.0
  - matplotlib>=3.10

  # Development tools (optional)
  - pytest>=9.0
  - pytest-cov>=7.0

  # Install JUG itself via pip (in editable mode)
  - pip:
    - jax>=0.9.0
    - jaxlib>=0.9.0
    - numpyro>=0.19.0
    - optax>=0.2.6
    - -e .
